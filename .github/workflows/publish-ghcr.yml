name: Publish GHCR Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [ "${GITHUB_REF_NAME}" = "master" ]; then
              echo "${image}:master"
              echo "${image}:latest"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.title=${GITHUB_REPOSITORY#*/}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: final
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: ${{ steps.prep.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
